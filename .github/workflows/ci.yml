name: CI

on:
  push:
    branches: [main, develop]
  pull_request:

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v5
        with:
          node-version: '20'
      - run: yarn install --frozen-lockfile --non-interactive
      - run: npx tsc --build --force
